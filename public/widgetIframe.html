<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --theme: #7c3aed;
      --theme2: #5b21b6;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --bot: #f1f5f9;
      --user: linear-gradient(135deg, var(--theme), var(--theme2));
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
    .app { display: flex; flex-direction: column; height: 100%; }
    .header {
      flex-shrink: 0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--theme), var(--theme2));
      color: #fff;
    }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.22);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; overflow: hidden; flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .header p { font-size: 11px; opacity: .85; margin-top: 2px; }
    .header-close {
      margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
      border: none; background: rgba(255,255,255,.18); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .body { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .chat-scroll {
      flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .bubble {
      max-width: 88%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.5;
      animation: fadeUp .25s ease; white-space: pre-wrap;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .bubble--bot { align-self: flex-start; background: var(--bot); color: #334155; border-bottom-left-radius: 4px; }
    .bubble--user { align-self: flex-end; background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .chip {
      padding: 8px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: #fff; color: var(--text); cursor: pointer;
      transition: all .15s;
    }
    .chip:hover { border-color: var(--theme); color: var(--theme); background: #faf5ff; }
    .composer {
      flex-shrink: 0; padding: 10px 12px 12px; background: var(--card);
      border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end;
    }
    .composer textarea {
      flex: 1; border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 12px;
      font-size: 13px; font-family: inherit; outline: none; resize: none; min-height: 42px; max-height: 100px;
    }
    .composer textarea:focus { border-color: var(--theme); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 12px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--theme), var(--theme2)); color: #fff;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }
    .typing { font-size: 11px; color: var(--muted); padding: 0 14px 6px; }
    .typing.hidden { display: none; }
    .handoff-bar {
      padding: 10px 14px; flex-shrink: 0; background: #faf5ff; border-top: 1px solid #ede9fe;
    }
    .handoff-bar.hidden { display: none; }
    .handoff-wa {
      width: 100%; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: none; background: #25d366; color: #fff;
    }
    .footer {
      flex-shrink: 0; text-align: center; padding: 8px; font-size: 10px; color: #94a3b8;
      background: var(--card); border-top: 1px solid var(--border);
    }
    .footer a { color: var(--theme); text-decoration: none; font-weight: 600; }
    .footer.hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header" id="header">
      <div class="avatar" id="headerAvatar">S</div>
      <div>
        <h1 id="headerTitle">Support</h1>
        <p id="headerSub">We typically reply in minutes</p>
      </div>
      <button type="button" class="header-close" id="closeBtn" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </header>

    <div class="body">
      <div class="chat-scroll" id="chatScroll"></div>
      <p class="typing hidden" id="typing">Assistant is typing…</p>
      <div class="handoff-bar hidden" id="handoffBar">
        <button type="button" class="handoff-wa" id="handoffWa">Continue on WhatsApp</button>
      </div>
      <div class="composer" id="composer">
        <textarea id="userInput" rows="1" placeholder="Ask about orders, shipping, products…"></textarea>
        <button type="button" class="send-btn" id="sendBtn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <footer class="footer" id="footer">Created by <a href="https://topedgeai.com" target="_blank" rel="noopener">TopEdge AI</a></footer>
  </div>

<script>
(function () {
  var params = {};
  location.search.replace(/^\?/, '').split('&').forEach(function (p) {
    var kv = p.split('=');
    if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
  });

  var FAQ = [
    { id: 'shipping', label: 'Shipping & delivery', reply: 'We ship across India. Most orders arrive in 3–7 business days. You will get tracking once your order ships.' },
    { id: 'returns', label: 'Returns & exchanges', reply: 'If something is not right, contact us with your order ID within the return window from your confirmation email.' },
    { id: 'order', label: 'Track my order', reply: 'Share your order number and the phone used at checkout — we will look up the latest status for you.' },
  ];

  var STATE = {
    clientId: params.clientId || 'default',
    apiBase: location.origin,
    waNumber: '',
    greeting: 'Hi! How can we help you today? 👋',
    theme: '#7C3AED',
    theme2: '#5B21B6',
    aiChat: false,
    hasWhatsApp: false,
    history: [],
    awaitingPhone: false,
    pendingMessage: '',
    busy: false,
  };

  var chatScroll = document.getElementById('chatScroll');
  var typing = document.getElementById('typing');
  var userInput = document.getElementById('userInput');
  var sendBtn = document.getElementById('sendBtn');
  var handoffBar = document.getElementById('handoffBar');

  function digitsOnly(s) { return String(s || '').replace(/\D/g, ''); }

  function applyTheme() {
    document.documentElement.style.setProperty('--theme', STATE.theme);
    document.documentElement.style.setProperty('--theme2', STATE.theme2);
  }

  function setHeader(branding, widget) {
    var title = widget.headerTitle || branding.businessName || 'Support';
    document.getElementById('headerTitle').textContent = title;
    document.getElementById('headerSub').textContent =
      widget.headerSubtitle || branding.supportHint || 'Ask us anything about your order';
    var av = document.getElementById('headerAvatar');
    if (widget.logoUrl || branding.logoUrl) {
      av.innerHTML = '<img src="' + (widget.logoUrl || branding.logoUrl) + '" alt="" />';
    } else {
      av.textContent = (branding.avatarLetter || title.charAt(0) || 'S').toUpperCase();
    }
    var foot = document.getElementById('footer');
    if (widget.showPoweredBy === false) {
      foot.classList.add('hidden');
    } else {
      foot.innerHTML = 'Created by <a href="' + (widget.poweredByUrl || 'https://topedgeai.com') + '" target="_blank" rel="noopener">TopEdge AI</a>';
    }
  }

  function addBubble(text, who) {
    var el = document.createElement('div');
    el.className = 'bubble bubble--' + (who === 'user' ? 'user' : 'bot');
    el.textContent = text;
    chatScroll.appendChild(el);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function addChips(items, onPick) {
    var wrap = document.createElement('div');
    wrap.className = 'chips';
    items.forEach(function (item) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.textContent = item.label;
      btn.addEventListener('click', function () {
        addBubble(item.label, 'user');
        onPick(item);
      });
      wrap.appendChild(btn);
    });
    chatScroll.appendChild(wrap);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function setBusy(on) {
    STATE.busy = on;
    sendBtn.disabled = on;
    typing.classList.toggle('hidden', !on);
  }

  function pushHistory(role, content) {
    STATE.history.push({ role: role, content: content });
    if (STATE.history.length > 12) STATE.history = STATE.history.slice(-12);
  }

  function showQuickChips() {
    addChips(FAQ, function (item) {
      addBubble(item.reply, 'bot');
      pushHistory('assistant', item.reply);
    });
  }

  function openWhatsApp(prefill) {
    var wa = digitsOnly(STATE.waNumber);
    if (!wa) return;
    var msg = prefill || STATE.pendingMessage || STATE.greeting;
    parent.postMessage({ type: 'topedge_wa_redirect', text: msg, waNumber: wa }, '*');
  }

  function submitLead(phone, message) {
    return fetch(STATE.apiBase + '/api/support-chat/widget-lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: STATE.clientId,
        phone: phone,
        message: message,
        source: 'website_widget',
        pageUrl: (function () { try { return parent.location.href; } catch (e) { return ''; } })(),
      }),
    });
  }

  function handleNoAiReply(userText) {
    pushHistory('user', userText);
    if (!STATE.awaitingPhone) {
      STATE.pendingMessage = userText;
      STATE.awaitingPhone = true;
      var reply = STATE.hasWhatsApp
        ? 'Thanks! Share your WhatsApp number and our team will reply shortly. You can also tap Continue on WhatsApp below.'
        : 'Thanks! Share your WhatsApp number and our team will reply shortly.';
      addBubble(reply, 'bot');
      pushHistory('assistant', reply);
      if (STATE.hasWhatsApp) handoffBar.classList.remove('hidden');
      return;
    }

    var phone = digitsOnly(userText);
    if (phone.length < 10) {
      addBubble('Please enter a valid 10-digit WhatsApp number.', 'bot');
      return;
    }

    setBusy(true);
    submitLead(phone, STATE.pendingMessage || userText)
      .then(function () {
        addBubble('Got it — our team will message you on WhatsApp soon.', 'bot');
        STATE.awaitingPhone = false;
        STATE.pendingMessage = '';
      })
      .catch(function () {
        addBubble('We could not save your details right now. Please try again in a moment.', 'bot');
      })
      .finally(function () { setBusy(false); });
  }

  function handleAiReply(userText) {
    pushHistory('user', userText);
    setBusy(true);
    fetch(STATE.apiBase + '/api/support-chat/widget-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: STATE.clientId,
        message: userText,
        history: STATE.history.slice(0, -1),
      }),
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (!res.ok || !res.data.reply) throw new Error('no reply');
        addBubble(res.data.reply, 'bot');
        pushHistory('assistant', res.data.reply);
      })
      .catch(function () {
        addBubble('Sorry — I could not reply right now. Try again or use WhatsApp below.', 'bot');
        if (STATE.hasWhatsApp) handoffBar.classList.remove('hidden');
      })
      .finally(function () { setBusy(false); });
  }

  function onUserSend() {
    var text = userInput.value.trim();
    if (!text || STATE.busy) return;
    userInput.value = '';
    addBubble(text, 'user');
    if (STATE.aiChat) handleAiReply(text);
    else handleNoAiReply(text);
  }

  function startChat() {
    addBubble(STATE.greeting, 'bot');
    pushHistory('assistant', STATE.greeting);
    showQuickChips();
    if (STATE.hasWhatsApp && !STATE.aiChat) handoffBar.classList.remove('hidden');
  }

  document.getElementById('closeBtn').addEventListener('click', function () {
    parent.postMessage({ type: 'topedge_close' }, '*');
  });
  document.getElementById('handoffWa').addEventListener('click', function () {
    openWhatsApp();
  });
  document.getElementById('sendBtn').addEventListener('click', onUserSend);
  userInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onUserSend(); }
  });

  function boot() {
    applyTheme();
    if (STATE.clientId === 'default') {
      STATE.aiChat = false;
      startChat();
      return;
    }
    fetch(STATE.apiBase + '/api/support-chat/widget-config/' + encodeURIComponent(STATE.clientId))
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        var w = cfg.widget || {};
        var b = cfg.branding || {};
        var caps = cfg.capabilities || {};
        STATE.theme = w.theme || STATE.theme;
        STATE.theme2 = w.themeSecondary || STATE.theme2;
        STATE.greeting = w.greeting || b.greeting || STATE.greeting;
        STATE.waNumber = b.supportWhatsApp || STATE.waNumber;
        STATE.aiChat = caps.aiChat === true;
        STATE.hasWhatsApp = caps.whatsAppHandoff === true;
        applyTheme();
        setHeader(b, w);
        startChat();
      })
      .catch(function () {
        startChat();
      });
  }

  boot();
})();
</script>
</body>
</html>
