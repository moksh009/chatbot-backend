<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --theme: #6366f1;
      --theme-dark: #4f46e5;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --radius: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
    }

    body { background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* === HEADER === */
    .header {
      background: var(--theme);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header-text p  { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; line-height: 1.35; }
    .header-close {
      margin-left: auto; cursor: pointer;
      background: rgba(255,255,255,0.18); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .header-close:hover { background: rgba(255,255,255,0.3); }
    .header-close svg { width: 18px; height: 18px; fill: #fff; }

    /* === TABS === */
    .tab-bar {
      display: flex; background: var(--card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 12px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      text-align: center; color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .tab.active { color: var(--theme); border-bottom-color: var(--theme); }

    /* === CONTENT === */
    .panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
    .panel.active { display: flex; }

    /* === WHATSAPP PANEL === */
    .wa-panel {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 20px; text-align: center;
      background: linear-gradient(160deg, #dcfce7 0%, #f0fdf4 100%);
    }
    .wa-icon-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: #25d366; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.4);
      animation: wa-bounce 2s infinite;
    }
    .wa-icon-wrap svg { width: 44px; height: 44px; fill: #fff; }
    @keyframes wa-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .wa-title { font-size: 20px; font-weight: 800; color: #166534; }
    .wa-sub   { font-size: 13px; color: #4ade80; font-weight: 600; }
    .wa-greeting {
      background: #fff; border-radius: 12px; padding: 14px 18px;
      font-size: 13px; color: #374151; line-height: 1.6;
      border: 1px solid #d1fae5;
      text-align: left; max-width: 100%; width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .wa-message-input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #d1fae5; border-radius: 12px;
      font-size: 13px; color: #374151; outline: none;
      background: #fff; resize: none; min-height: 80px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .wa-message-input:focus { border-color: #25d366; }
    .wa-btn {
      width: 100%; padding: 14px;
      background: #25d366; color: #fff;
      font-size: 14px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 16px rgba(37,211,102,0.36);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,0.4); }
    .wa-btn svg { width: 20px; height: 20px; fill: #fff; }
    .wa-alt {
      width: 100%; padding: 12px 14px; margin-top: 4px;
      font-size: 12px; font-weight: 600; color: #166534;
      background: rgba(255,255,255,0.85); border: 1px solid #bbf7d0;
      border-radius: 12px; cursor: pointer; font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }
    .wa-alt:hover { background: #fff; border-color: #25d366; }

    /* === FORM PANEL === */
    .form-back {
      display: none; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0 0 4px;
      font-family: inherit; margin-bottom: 4px;
    }
    .form-back.visible { display: inline-flex; }
    .form-back:hover { color: var(--theme); }
    .form-panel { flex: 1; overflow-y: auto; padding: 24px; gap: 16px; display: flex; flex-direction: column; }
    .form-greeting {
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--theme), var(--theme-dark));
      color: #fff; border-radius: var(--radius);
      font-size: 13px; line-height: 1.6; font-weight: 500;
    }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .form-input {
      padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 13px; color: var(--text);
      background: var(--card); outline: none; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus { border-color: var(--theme); box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme) 15%, transparent); }

    textarea.form-input { resize: none; min-height: 90px; }

    .form-submit {
      padding: 14px; background: var(--theme);
      color: #fff; font-size: 14px; font-weight: 800;
      border: none; border-radius: 12px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--theme) 40%, transparent);
      margin-top: auto;
    }
    .form-submit:hover { transform: translateY(-2px); }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* === SUCCESS STATE === */
    .success-screen {
      flex: 1; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px; gap: 16px; text-align: center;
      background: linear-gradient(160deg, #f0fdf4 0%, #f8fafc 100%);
    }
    .success-screen.visible { display: flex; }
    .success-circle { width: 72px; height: 72px; border-radius: 50%; background: #22c55e; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(34,197,94,0.3); }
    .success-circle svg { width: 36px; height: 36px; fill: #fff; }
    .success-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .success-sub   { font-size: 13px; color: var(--muted); }

    /* === FOOTER === */
    .footer {
      padding: 8px; text-align: center;
      font-size: 10px; color: #94a3b8; font-weight: 600;
      border-top: 1px solid var(--border); background: var(--card);
      flex-shrink: 0;
    }
    .footer a { color: var(--theme); text-decoration: none; }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="header">
  <div class="header-avatar" id="headerAvatar">T</div>
  <div class="header-text">
    <h1 id="headerTitle">Support Chat</h1>
    <p id="headerSub">We reply as soon as we can.</p>
  </div>
  <button class="header-close" onclick="closeWidget()" title="Close">
    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </button>
</div>

<!-- TABS (only shown for dual-mode) -->
<div class="tab-bar" id="tabBar" style="display:none">
  <div class="tab active" data-tab="whatsapp" role="tab" onclick="switchTab('whatsapp')">WhatsApp</div>
  <div class="tab" data-tab="form" role="tab" onclick="switchTab('form')">Message team</div>
</div>

<!-- WHATSAPP PANEL -->
<div class="panel active" id="panel-whatsapp">
  <div class="wa-panel">
    <div class="wa-icon-wrap">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.296-.767.966-.94 1.164-.174.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.57-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </div>
    <div class="wa-title">Message us on WhatsApp</div>
    <div class="wa-sub">Fastest way to reach our team</div>
    <div class="wa-greeting" id="waGreeting">Hi! How can we help you today? 👋</div>
    <textarea class="wa-message-input" id="waMessage" placeholder="Type your message (optional)..."></textarea>
    <button type="button" class="wa-alt" id="waAltForm" style="display:none" onclick="openFormFromWhatsApp()">Prefer not to use WhatsApp? Leave your details</button>
    <button class="wa-btn" type="button" onclick="openWhatsApp()">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.296-.767.966-.94 1.164-.174.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.57-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      Open WhatsApp
    </button>
  </div>
</div>

<!-- FORM PANEL -->
<div class="panel" id="panel-form">
  <div class="form-panel" id="formContent">
    <button type="button" class="form-back" id="formBackBtn" onclick="backToWhatsApp()">← Back</button>
    <div class="form-greeting" id="formGreeting">Hi! How can we help you today? 👋</div>
    <div class="form-field">
      <label class="form-label">Your Name *</label>
      <input class="form-input" id="fieldName" type="text" placeholder="John Doe" />
    </div>
    <div class="form-field">
      <label class="form-label">Phone / WhatsApp *</label>
      <input class="form-input" id="fieldPhone" type="tel" placeholder="+91 9XXXXXXXXX" />
    </div>
    <div class="form-field">
      <label class="form-label">Email (optional)</label>
      <input class="form-input" id="fieldEmail" type="email" placeholder="you@company.com" />
    </div>
    <div class="form-field">
      <label class="form-label">Your Message *</label>
      <textarea class="form-input" id="fieldMessage" placeholder="How can we help you?"></textarea>
    </div>
    <button type="button" class="form-submit" id="formSubmit" onclick="submitForm()">Send to our team</button>
  </div>
  <div class="success-screen" id="successScreen">
    <div class="success-circle">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </div>
    <div class="success-title">Message Sent! 🎉</div>
    <div class="success-sub">We'll get back to you shortly.<br/>Check your WhatsApp for updates.</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">Powered by <a href="https://topedgeai.com" target="_blank">TopEdge AI</a></div>

<script>
  // ── Parse URL Params ──────────────────────────────────────────────────────
  var params = {};
  window.location.search.replace(/^\?/, '').split('&').forEach(function(p) {
    var kv = p.split('=');
    if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
  });

  var CONFIG = {
    clientId: params.clientId || 'default',
    waNumber:  params.waNumber  || '',
    greeting:  params.greeting  || 'Hi! How can we help you today? 👋',
    theme:     params.theme     || '#6366f1',
    mode:      params.mode      || 'whatsapp',
    apiBase:   window.location.origin
  };

  function digitsOnly(s) {
    return String(s || '').replace(/\D/g, '');
  }

  function effectiveWa() {
    return digitsOnly(CONFIG.waNumber);
  }

  // ── Apply Theme ───────────────────────────────────────────────────────────
  document.documentElement.style.setProperty('--theme', CONFIG.theme);
  document.documentElement.style.setProperty('--theme-dark', CONFIG.theme);
  document.getElementById('waGreeting').textContent = CONFIG.greeting;
  document.getElementById('formGreeting').textContent = CONFIG.greeting;
  document.getElementById('header').style.background = CONFIG.theme;
  document.getElementById('headerAvatar').textContent = 'T';
  document.getElementById('headerTitle').textContent  = 'Support';

  // ── Show correct panel ────────────────────────────────────────────────────
  if (CONFIG.mode === 'form') {
    document.getElementById('panel-whatsapp').classList.remove('active');
    document.getElementById('panel-form').classList.add('active');
    document.getElementById('formBackBtn').classList.remove('visible');
  } else if (CONFIG.mode === 'both') {
    document.getElementById('tabBar').style.display = 'flex';
  } else if (CONFIG.mode === 'whatsapp') {
    document.getElementById('waAltForm').style.display = 'block';
  }

  // ── Load client info from API ─────────────────────────────────────────────
  if (CONFIG.clientId !== 'default') {
    fetch(CONFIG.apiBase + '/api/support-chat/config/' + CONFIG.clientId)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.businessName) document.getElementById('headerTitle').textContent = d.businessName;
        if (d.avatarLetter) document.getElementById('headerAvatar').textContent = d.avatarLetter;
        if (d.greeting) {
          CONFIG.greeting = d.greeting;
          document.getElementById('waGreeting').textContent = d.greeting;
          document.getElementById('formGreeting').textContent = d.greeting;
        }
        if (d.supportHint) document.getElementById('headerSub').textContent = d.supportHint;
        if (d.supportWhatsApp && !effectiveWa()) {
          CONFIG.waNumber = d.supportWhatsApp;
        }
      })
      .catch(function() {});
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-tab') === tab);
    });
    document.querySelectorAll('.panel').forEach(function(p) {
      p.classList.toggle('active', p.id === 'panel-' + tab);
    });
    document.getElementById('formBackBtn').classList.remove('visible');
  }

  function openFormFromWhatsApp() {
    document.getElementById('panel-whatsapp').classList.remove('active');
    document.getElementById('panel-form').classList.add('active');
    document.getElementById('formBackBtn').classList.add('visible');
  }

  function backToWhatsApp() {
    if (CONFIG.mode !== 'whatsapp') return;
    document.getElementById('panel-form').classList.remove('active');
    document.getElementById('panel-whatsapp').classList.add('active');
    document.getElementById('formBackBtn').classList.remove('visible');
  }

  function closeWidget() {
    window.parent.postMessage({ type: 'topedge_close' }, '*');
  }

  function openWhatsApp() {
    var wa = effectiveWa();
    if (!wa) {
      openFormFromWhatsApp();
      alert('WhatsApp number is not set yet. Please leave your details and we will reach out.');
      return;
    }
    var msg = (document.getElementById('waMessage').value || '').trim() || CONFIG.greeting;
    window.parent.postMessage({ type: 'topedge_wa_redirect', text: msg, waNumber: wa }, '*');
  }

  function submitForm() {
    var name    = (document.getElementById('fieldName').value || '').trim();
    var phone   = (document.getElementById('fieldPhone').value || '').trim();
    var email   = (document.getElementById('fieldEmail').value || '').trim();
    var message = (document.getElementById('fieldMessage').value || '').trim();

    if (!name || !phone || !message) {
      alert('Please fill in all required fields.');
      return;
    }

    var btn = document.getElementById('formSubmit');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    fetch(CONFIG.apiBase + '/api/support-chat/widget-lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clientId: CONFIG.clientId,
        name: name,
        phone: phone,
        email: email,
        message: message,
        source: 'website_widget',
        pageUrl: document.referrer || window.location.href
      })
    })
    .then(function(r) {
      return r.json().then(function(d) {
        return { ok: r.ok, d: d };
      });
    })
    .then(function(x) {
      if (!x.ok || !x.d.success) {
        throw new Error(x.d.message || 'Request failed');
      }
      document.getElementById('formContent').style.display = 'none';
      document.getElementById('successScreen').classList.add('visible');
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Send to our team';
      alert('Something went wrong. Please try again or use WhatsApp.');
    });
  }
</script>
</body>
</html>
